<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I miei animali Preferiti</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script type="text/babel">
      const { useState } = React;

      const ReactApp = () => {
        const animalsChoices = [
          "Cane",
          "Gatto",
          "Pappagallo",
          "Cavallo",
          "Panda",
        ];
        const [animals, setAnimals] = useState([]);
        console.log(animals);

        function Random() {
          let randomico = Math.floor(Math.random() * animalsChoices.length);
          let animaleFortunato = animalsChoices[randomico];
          setAnimals((prev) => [...prev, animaleFortunato]);
        }

        const [show, setShow] = useState();
        const [animaleUtente, setAnimaleUtente] = useState("");

        function Modal({ title, content, show = false, onClose = () => {} }) {
          return (
            show &&
            ReactDOM.createPortal(
              <div className="modal-container">
                <div className="modal">
                  <h2>{title}</h2>
                  <p>{content}</p>
                  <button onClick={onClose}>Annulla</button>
                  <button onClick={aggiungiAnimaleUtente}>Conferma</button>
                </div>
              </div>,
              document.body,
            )
          );
        }

        function aggiungiAnimaleUtente() {
          setAnimals((prev) => [...prev, animaleUtente]);
          setAnimaleUtente("");
          setShow(false);
        }

        return (
          <>
            <button onClick={Random}>Aggiungi animale</button>
            <button onClick={() => setShow(true)}>
              Aggiungi animale di tua scelta
            </button>
            <details>
              <ul>
                {animals.map((animal) => (
                  <li key={animal + 1}>{animal}</li>
                ))}
              </ul>

              <section>
                <Modal
                  title="Il mio titolo"
                  content={
                    <input
                      value={animaleUtente}
                      onChange={(e) => setAnimaleUtente(e.target.value)}
                      placeholder="Inserisci animale"
                    />
                  }
                  show={show}
                  onClose={() => setShow(false)}
                />
              </section>
            </details>
          </>
        );
      };
    </script>
    <script type="text/babel">
      const { createRoot } = ReactDOM;
      const listaAnimali = document.querySelector(".lista-animali");
      const root = createRoot(listaAnimali);
      root.render(<ReactApp />);
    </script>
  </head>
  <body>
    <header>
      <h1>I miei animali Preferiti</h1>
    </header>
    <main>
      <figure>
        <img src="https://picsum.photos/400/300" alt="Immagine Casuale" />
      </figure>
      <div class="lista-animali"></div>
    </main>
    <footer>
      <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>
  </body>
</html>
